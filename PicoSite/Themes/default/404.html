<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 520px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .code {
            font-size: 120px;
            font-weight: 700;
            color: #4a6cf7;
            line-height: 1;
            letter-spacing: 8px;
        }
        .title {
            font-size: 22px;
            color: #2d3748;
            margin: 25px 0 12px;
        }
        .desc {
            font-size: 16px;
            color: #718096;
            line-height: 1.8;
            margin-bottom: 35px;
        }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #4a6cf7;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #3451d1;
            box-shadow: 0 4px 15px rgba(74, 108, 247, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h2 class="title">页面走丢了</h2>
        <p class="desc">你访问的页面不存在或链接有误</p>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
