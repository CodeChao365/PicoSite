name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Publish (win-x64)
        run: |
          dotnet publish PicoSite/PicoSite.csproj `
            --configuration Release `
            --runtime win-x64 `
            -p:PublishAot=true `
            -p:DebugType=embedded `
            --output ./publish/win-x64

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./publish/win-x64/picosite.exe
          asset_name: picosite-win-x64.exe
          tag: ${{ github.ref_name }}
          overwrite: true

  publish-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Publish (linux-x64)
        run: |
          dotnet publish PicoSite/PicoSite.csproj \
            --configuration Release \
            --runtime linux-x64 \
            -p:PublishAot=true \
            -p:DebugType=embedded \
            --output ./publish/linux-x64

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./publish/linux-x64/picosite
          asset_name: picosite-linux-x64
          tag: ${{ github.ref_name }}
          overwrite: true

  publish-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        rid: [osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish PicoSite/PicoSite.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:DebugType=embedded \
            --output ./publish/${{ matrix.rid }}

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./publish/${{ matrix.rid }}/picosite
          asset_name: picosite-${{ matrix.rid }}
          tag: ${{ github.ref_name }}
          overwrite: true
