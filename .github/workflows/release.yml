name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Set asset extension
        id: asset
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            echo "ext=.exe" >> "$GITHUB_OUTPUT"
          else
            echo "ext=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish PicoSite/PicoSite.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            --output ./publish/${{ matrix.rid }}

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./publish/${{ matrix.rid }}/picosite${{ steps.asset.outputs.ext }}
          asset_name: picosite-${{ matrix.rid }}${{ steps.asset.outputs.ext }}
          tag: ${{ github.ref_name }}
          overwrite: true
